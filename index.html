<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أولاد المنصورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <nav class="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-bold">أولاد المنصورة <i class="fas fa-construction"></i></h1>
        <div id="sync-status" class="w-3 h-3 rounded-full bg-gray-400"></div>
    </nav>

    <main class="p-4 mb-20">
        <div class="bg-blue-600 rounded-2xl p-6 text-white shadow-lg mb-6 text-center">
            <p class="text-xs opacity-80">إجمالي المصاريف المسجلة</p>
            <h2 id="total-val" class="text-3xl font-bold">0 ج.م</h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <form id="exp-form" class="space-y-4">
                <input type="text" id="d" placeholder="وصف المصروف" class="w-full p-3 bg-slate-50 rounded-xl outline-none" required>
                <div class="flex gap-2">
                    <input type="number" id="a" placeholder="المبلغ" class="w-2/3 p-3 bg-slate-50 rounded-xl outline-none" required>
                    <select id="c" class="w-1/3 p-3 bg-slate-50 rounded-xl outline-none">
                        <option>وقود</option>
                        <option>أدوات</option>
                        <option>أجور</option>
                        <option>نثريات</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold active:scale-95 transition-transform">حفظ ومزامنة</button>
            </form>
        </div>

        <div id="list" class="space-y-3"></div>
    </main>

    <script>
        // الروابط الصحيحة الخاصة بك
        const S_URL = 'https://stqpublftpzvwpbrklow.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdHFwdWJsdGZwenZ3cGJya2xvdyIsInJlZiI6InN0cXB1Ymx0ZnB6dndwYnJrbG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0MjAxMzcsImV4cCI6MjA1ODAwMDEzN30.R_l-z01B9_X2C07L-f7m3q3L7N0l3-z3L7N0l3-z3L7N'; 
        
        const db = new Dexie("MansouraDB");
        db.version(1).stores({ expenses: '++id, description, amount, category, date, sync_status' });

        const sb = supabase.createClient(S_URL, S_KEY);

        async function updateUI() {
            const all = await db.expenses.toArray();
            const total = all.reduce((sum, item) => sum + Number(item.amount), 0);
            document.getElementById('total-val').innerText = total + ' ج.م';
            
            document.getElementById('list').innerHTML = all.reverse().map(i => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 ${i.sync_status === 'synced' ? 'border-green-500' : 'border-orange-500'}">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${i.description}</span>
                        <span class="text-blue-600 font-bold">${i.amount} ج.م</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-1">${i.date} - ${i.category}</div>
                </div>
            `).join('');
        }

        async function sync() {
            const status = document.getElementById('sync-status');
            try {
                const unsynced = await db.expenses.where('sync_status').equals('pending').toArray();
                for (let item of unsynced) {
                    const { error } = await sb.from('expenses').insert([{
                        description: item.description,
                        amount: item.amount,
                        category: item.category,
                        date: item.date
                    }]);
                    if (!error) await db.expenses.update(item.id, { sync_status: 'synced' });
                }
                status.className = "w-3 h-3 rounded-full bg-green-500";
            } catch (e) {
                status.className = "w-3 h-3 rounded-full bg-orange-500";
            }
            updateUI();
        }

        document.getElementById('exp-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                description: document.getElementById('d').value,
                amount: document.getElementById('a').value,
                category: document.getElementById('c').value,
                date: new Date().toLocaleString('ar-EG'),
                sync_status: 'pending'
            };
            await db.expenses.add(data);
            e.target.reset();
            sync();
        };

        updateUI();
        sync();
        setInterval(sync, 10000);
    </script>
</body>
</html>
